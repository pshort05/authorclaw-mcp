services:

  # Step 1: Apply the LAN patch to AuthorClaw source before building the gateway.
  # Mutates the files in AUTHORCLAW_SRC on the host so the subsequent build picks
  # up the patched source.  Runs once and exits.
  authorclaw-patcher:
    # Pinned to a content digest for supply-chain integrity (SR-4, CM-2).
    image: alpine:3.19@sha256:6baf43584bcb78f2e5847d1de515f23499913ac9f12bdf834811a3145eb11ca1
    volumes:
      - ${AUTHORCLAW_SRC:-/opt/docker-compose/authorclaw/src}:/src
      - ./authorclaw-docker-fix/apply-lan-patch.sh:/apply-lan-patch.sh:ro
    environment:
      - REPO=/src
    # apply-lan-patch.sh uses bash features (declare) and python3 for safe
    # literal-string replacement. Install both before invoking with bash.
    command: sh -c 'apk add --no-cache bash python3 && bash /apply-lan-patch.sh'
    # Runs once and exits; authorclaw waits for it via depends_on
    # (condition: service_completed_successfully).

  # Step 2: AuthorClaw gateway (patched).
  authorclaw:
    build:
      context: ${AUTHORCLAW_SRC:-/opt/docker-compose/authorclaw/src}
      dockerfile: docker/Dockerfile
    container_name: authorclaw
    restart: unless-stopped
    depends_on:
      authorclaw-patcher:
        condition: service_completed_successfully
    environment:
      - AUTHORCLAW_BIND=0.0.0.0
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
    volumes:
      - authorclaw-workspace:/app/workspace
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - "fetch('http://localhost:3847/api/health').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 10s
    # NOTE: port 3847 is NOT published to the host.
    # Only authorclaw-mcp can reach it, via the internal Docker network.
    networks:
      - authorclaw-internal

  # Step 3: MCP bridge (this repo).
  authorclaw-mcp:
    # Pin to a specific version rather than :latest. To upgrade, bump this tag
    # alongside the package.json version and verify against the release notes
    # at https://github.com/pshort05/authorclaw-mcp/releases (SR-4).
    image: ghcr.io/pshort05/authorclaw-mcp:0.2.7
    container_name: authorclaw-mcp
    restart: unless-stopped
    depends_on:
      authorclaw:
        condition: service_healthy
    ports:
      - "3000:3000"
    environment:
      - AUTHORCLAW_URL=http://authorclaw:3847
      - AUTH_ENABLED=true
      - MCP_CLIENT_ID=authorclaw
      - MCP_CLIENT_SECRET=${MCP_CLIENT_SECRET}
      - MCP_ISSUER_URL=${MCP_ISSUER_URL:-}
      - CORS_ORIGINS=https://claude.ai
    read_only: true
    security_opt:
      - no-new-privileges:true
    networks:
      - authorclaw-internal

volumes:
  authorclaw-workspace:

networks:
  authorclaw-internal:
    driver: bridge
